[versions]
agp = "9.1.0"
kotlin = "2.2.10"
coreKtx = "1.15.0"
junit = "4.13.2"
junitVersion = "1.2.1"
espressoCore = "3.6.1"
lifecycleRuntimeKtx = "2.8.7"
activityCompose = "1.9.3"
composeBom = "2025.03.00"
room = "2.7.1"
nav-compose = "2.8.5"
hilt = "2.56.2"
hilt-navigation-compose = "1.2.0"
desugar = "2.1.4"
zxing-core = "3.5.3"
zxing-android = "4.3.0"
camerax = "1.4.1"
